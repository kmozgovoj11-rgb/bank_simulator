services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bank-simulator-backend
    ports:
      - "8080:8080"
    volumes:
      - bank-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bank-simulator-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  bank-data:
